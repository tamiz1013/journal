<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1c1b"/>
      <stop offset="1" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>

  <!-- rounded dark tile -->
  <rect x="1" y="1" width="62" height="62" rx="14" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="13.5" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>

  <!-- rising equity curve -->
  <path d="M10 46 L24 36 L34 41 L54 18" fill="none" stroke="#3987e5"
        stroke-opacity="0.55" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- candlesticks: down, up, up — ascending -->
  <g stroke-linecap="round">
    <!-- red candle -->
    <line x1="16" y1="30" x2="16" y2="52" stroke="#d03b3b" stroke-width="3"/>
    <rect x="11" y="34" width="10" height="12" rx="2.5" fill="#d03b3b"/>
    <!-- green candle -->
    <line x1="32" y1="22" x2="32" y2="46" stroke="#12b512" stroke-width="3"/>
    <rect x="27" y="26" width="10" height="14" rx="2.5" fill="#12b512"/>
    <!-- tall green candle -->
    <line x1="48" y1="10" x2="48" y2="38" stroke="#12b512" stroke-width="3"/>
    <rect x="43" y="15" width="10" height="16" rx="2.5" fill="#12b512"/>
  </g>
</svg>
